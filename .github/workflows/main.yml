# (이전 단계: BigQuery -> CSV 추출 완료)

      - name: Install Python dependencies
        run: pip install --quiet requests

      - name: Send CSV Data to KDocs
        env:
          # 여기에 캡처 화면의 토큰과 주소창의 파일 ID를 넣어줍니다.
          # (GitHub Secrets에 등록하고 쓰는 것을 권장하지만, 테스트 시엔 직접 넣으셔도 됩니다)
          KDOCS_TOKEN: "T0xxxxxxxxxxxxxxxxxx"  
          KDOCS_FILE_ID: "여기에_주소창에_있는_문서ID_넣기" 
        run: python send_to_kdocs.py
